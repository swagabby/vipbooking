<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAG VIP Welfare System</title>
    <!-- 完全不使用外部 CSS 框架，所有樣式內嵌於下方 -->
    <style>
        /* CSS 變數與基礎設定 */
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #ff5a5f;
            --primary-glow: rgba(255, 90, 95, 0.3);
            --text-white: #ffffff;
            --text-gray: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 800px; width: 100%; }

        /* 標頭樣式 */
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .subtitle { color: var(--text-gray); font-size: 14px; }

        /* 用戶資訊卡 */
        .user-info {
            display: inline-flex;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 8px 24px;
            border-radius: 100px;
            margin-top: 24px;
            font-size: 13px;
            backdrop-filter: blur(10px);
        }
        .dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; margin-right: 10px; box-shadow: 0 0 8px #10b981; }

        /* 網格系統 */
        .benefit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
        }

        /* 福利卡片樣式 */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
            backdrop-filter: blur(10px);
        }
        .card:hover:not(.locked) {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px -10px var(--primary-glow);
        }
        .card.locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

        .card-tag { font-size: 10px; font-weight: 700; color: var(--text-gray); letter-spacing: 1px; margin-bottom: 15px; }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .card-desc { font-size: 13px; color: var(--text-gray); line-height: 1.5; }
        .card-footer { margin-top: 20px; font-size: 12px; font-weight: 700; color: var(--primary); }

        /* 骨架屏載入動畫 */
        .skeleton {
            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            height: 180px;
            border-radius: 24px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* 彈窗樣式 */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px; backdrop-filter: blur(10px);
        }
        .modal-body {
            background: #111;
            border: 1px solid var(--border);
            border-radius: 32px;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            position: relative;
        }
        .close { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: #444; }

        .form-group { margin-bottom: 20px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-gray); display: block; margin-bottom: 8px; }
        input, textarea {
            width: 100%; background: #000; border: 1px solid var(--border);
            border-radius: 12px; padding: 14px; color: #fff; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); }

        .submit-btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--primary); color: #fff; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.2s;
        }
        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:disabled { background: #333; cursor: not-allowed; }

        /* 語系切換 */
        .langs { position: fixed; top: 20px; right: 20px; display: flex; gap: 8px; }
        .lang-btn { background: var(--card-bg); border: 1px solid var(--border); color: #888; padding: 5px 12px; border-radius: 50px; font-size: 10px; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="langs">
        <button class="lang-btn" onclick="setLang('zh')">繁中</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>

    <div class="container">
        <header>
            <h1 id="ui-title">VIP 預約系統</h1>
            <p class="subtitle" id="ui-subtitle">尊榮會員專屬福利預定服務</p>
            <div class="user-info">
                <span class="dot"></span>
                <span id="u-id" style="margin-right: 15px; color: #666; font-family: monospace;">Syncing...</span>
                <span id="u-lv" style="font-weight: 800; color: var(--primary);">--</span>
            </div>
        </header>

        <!-- Loading View -->
        <div id="loading" class="benefit-grid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>

        <!-- Main Content -->
        <div id="grid" class="benefit-grid hidden"></div>
    </div>

    <!-- Booking Modal -->
    <div id="modal">
        <div class="modal-body">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="m-title" style="margin-bottom: 25px;">福利預約</h2>
            
            <div class="form-group">
                <label>主播 ID (ANCHOR ID)</label>
                <input type="text" id="anchor_id" placeholder="請輸入主播 ID">
            </div>
            
            <div class="form-group" id="date-group">
                <label>預約日期 (DATE)</label>
                <input type="date" id="reserve_date">
            </div>
            
            <div class="form-group">
                <label>內容細節 / 備註</label>
                <textarea id="reserve_content" rows="3" placeholder="請輸入客製內容或需求..."></textarea>
            </div>
            
            <button id="btn-submit" class="submit-btn" onclick="submitData()">確認提交預約</button>
        </div>
    </div>

    <script>
        const API_LEVEL = 'https://swag-user-info-api-905468082258.asia-east1.run.app/api/badges';
        const API_GAS = 'https://script.google.com/macros/s/AKfycbxlMEEW3k4D8ABAlPK4WdGmNk3CC1s4mMxZP06Sfy8bm2ZcQPXIJ006RkSca9k0W7D-Ug/exec';

        let user = { id: '', level: 0 };
        let activeBenefit = null;

        const BENEFITS = [
            { id: '1', name: '大神贊助', lv: 50, desc: '直播間高度曝光曝光 24h', hasDate: true },
            { id: '2', name: '女神聚會', lv: 50, desc: '參加線下高質感聚會交流', hasDate: false },
            { id: '3', name: '訂製小鈴噹', lv: 60, desc: '客製化推播宣傳通知', hasDate: true },
            { id: '4', name: '蓋板創作者封面', lv: 70, desc: '全站蓋板曝光製作', hasDate: false },
            { id: '5', name: '訂製搜尋框文字', lv: 70, desc: '打造個人專屬熱搜字', hasDate: true },
            { id: '6', name: '訂製專屬徽章', lv: 80, desc: '永久存於帳號的身份象徵', hasDate: false },
            { id: '7', name: '訂製專屬禮物', lv: 80, desc: '專屬直播間動畫禮物', hasDate: false },
            { id: '8', name: '專屬直播欄位廣告', lv: 90, desc: '探索頁面焦點曝光', hasDate: false }
        ];

        async function init() {
            const params = new URLSearchParams(window.location.search);
            user.id = params.get('user_id');

            if (!user.id) {
                document.getElementById('u-id').innerText = "Missing ID";
                return;
            }

            try {
                const res = await fetch(`${API_LEVEL}?user_id=${user.id}`);
                const data = await res.json();
                user.level = data.level || (data.data && data.data.level) || 0;
                
                document.getElementById('u-id').innerText = `ID: ${user.id}`;
                document.getElementById('u-lv').innerText = `LV.${user.level}`;
                
                render();
            } catch (e) {
                document.getElementById('u-id').innerText = "API Error";
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('grid').classList.remove('hidden');
            }
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = BENEFITS.map(b => {
                const locked = user.level < b.lv;
                return `
                    <div class="card ${locked ? 'locked' : ''}" onclick="${locked ? '' : `openModal('${b.id}')`}">
                        <div>
                            <div class="card-tag">LV.${b.lv} REQUIREMENT</div>
                            <h3 class="card-title">${b.name}</h3>
                            <p class="card-desc">${b.desc}</p>
                        </div>
                        <div class="card-footer">${locked ? '🔒 尚未解鎖' : '立即預約 →'}</div>
                    </div>
                `;
            }).join('');
        }

        function openModal(id) {
            activeBenefit = BENEFITS.find(b => b.id === id);
            document.getElementById('m-title').innerText = activeBenefit.name;
            document.getElementById('date-group').style.display = activeBenefit.hasDate ? 'block' : 'none';
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

async function submitData() {
    const btn = document.getElementById('btn-submit');
    const payload = {
        user_id: user.id,
        level: user.level,
        benefit: activeBenefit.name,
        anchor_id: document.getElementById('anchor_id').value,
        date: document.getElementById('reserve_date').value,
        content: document.getElementById('reserve_content').value
    };

    if (!payload.anchor_id) return alert("請填寫主播 ID");
    if (activeBenefit.hasDate && !payload.date) return alert("請選擇預約日期");

    btn.disabled = true;
    btn.innerText = "提交中...";

    try {
        // 使用更穩定的 fetch 方式
        await fetch(API_GAS, {
            method: 'POST',
            mode: 'no-cors', // 必須使用 no-cors 以跳過 GAS 的轉向限制
            headers: {
                'Content-Type': 'text/plain', // GAS 接收 JSON 字串的最穩方式
            },
            body: JSON.stringify(payload)
        });

        // 由於 no-cors 模式無法讀取回傳值，我們直接提示用戶並重新載入
        alert("預約資料已成功送出！\n請稍候 3-5 秒後檢查試算表。");
        closeModal();
        location.reload();

    } catch (e) {
        console.error("Submit Error:", e);
        alert("提交發生錯誤，請稍後再試。");
    } finally {
        btn.disabled = false;
        btn.innerText = "確認提交預約";
    }
}

        function setLang(lang) {
            const t = {
                zh: { title: "VIP 預約系統", sub: "尊榮會員專屬福利預定服務" },
                en: { title: "VIP Welfare", sub: "Exclusive Booking Service" }
            };
            document.getElementById('ui-title').innerText = t[lang].title;
            document.getElementById('ui-subtitle').innerText = t[lang].sub;
        }

        init();
    </script>
</body>
</html>
