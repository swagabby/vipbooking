<script>
    // ... 前方的設定維持不變 ...

    async function syncAndCheck() {
        const sid = document.getElementById('swagger_id').value.trim();
        if (!sid) return alert("請輸入 Swagger ID");
        const btn = document.getElementById('btn-check');
        btn.innerText = "⏳ 同步中..."; btn.disabled = true;
        try {
            const actionMap = { '大神贊助': 'getGrandSponsorData', '女神聚會': 'getPartyData', '訂製小鈴噹通知': 'getBellData', '蓋板創作者封面': 'getCoverData', '訂製搜尋框文字': 'getSearchBoxData' };
            const res = await fetch(`${GAS_API}?action=${actionMap[activeWelfare]}&v=${Date.now()}`);
            bookings = await res.json();
            const select = document.getElementById('reserve_date');
            select.disabled = false; select.innerHTML = '<option value="">請選擇可用日期/場次</option>';
            
            const today = new Date();
            if (activeWelfare === '女神聚會') {
                let m = ((today.getMonth()+1)%2===0)?today.getMonth()+1:today.getMonth()+2;
                let y = today.getFullYear(); if(m>12){m=2;y+=1;}
                const ds = `${y}-${String(m).padStart(2,'0')}`;
                const occupied = bookings.some(b => b.swagger_id === sid && b.date.includes(ds));
                select.add(new Option(`${y}年 ${m}月場次`+(occupied?" (此ID已被預約)":""), ds));
                select.options[select.options.length-1].disabled = occupied;
            } else {
                const limit = new Date(today.getFullYear(), today.getMonth() + 1, 5);
                const startDay = (activeWelfare === '蓋板創作者封面') ? 14 : 1;
                for (let i = startDay; i <= 60; i++) {
                    const d = new Date(today); d.setDate(today.getDate() + i);
                    if (d > limit && activeWelfare !== '訂製搜尋框文字') break;
                    
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    const ds = `${y}-${m}-${day}`; // 格式化為 2026-03-15
                    
                    // 【強化比對邏輯：移除所有符號進行純數字比對】
                    const sidMatch = sid.toUpperCase();
                    const dateMatch = ds.replace(/-/g, '');
                    
                    const occupied = bookings.some(b => b.swagger_id.toUpperCase() === sidMatch && b.date.replace(/-/g, '').includes(dateMatch));
                    const dayBookings = bookings.filter(b => b.date.replace(/-/g, '').includes(dateMatch));
                    const dayCount = dayBookings.length;
                    
                    const userMonthBookings = bookings.filter(b => b.username === user.username && b.date.replace(/-/g, '').includes(dateMatch.substring(0,6)));
                    const userFull = userMonthBookings.length >= (user.level >= 90 ? 2 : 1);

                    let st = ""; let dis = false;
                    
                    if (occupied) { 
                        st = " (此ID已被預約)"; dis = true; 
                    } else if (activeWelfare === '大神贊助') {
                        if (userFull) { st = " (本月2次已滿)"; dis = true; }
                        else if (dayCount >= 3 && user.level < 90) { st = ` (${dayCount}/3 預約額滿)`; dis = true; }
                        else if (dayCount > 0) { st = ` (${dayCount}/3 已預約)`; } // 顯示目前進度
                    } else if (activeWelfare !== '訂製搜尋框文字' && dayCount >= 1) {
                        st = " (預約額滿)"; dis = true;
                    }

                    const opt = new Option(ds + st, ds);
                    opt.disabled = dis;
                    select.add(opt);
                }
            }
            btn.innerText = "✅ 核對完成";
        } catch (e) { console.error(e); alert("連線失敗"); } finally { btn.disabled = false; }
    }
    // ... 後方 handleFormSubmit 維持不變 ...
</script>
