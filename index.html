<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAG VIP Welfare System</title>
    <style>
        /* --- 2025 Modern Dark Style (Zero External Dependency) --- */
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #ff5a5f;
            --primary-glow: rgba(255, 90, 95, 0.3);
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px 20px; display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 850px; width: 100%; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }

        /* User Pill - 顯示名稱與等級 */
        .user-pill {
            display: inline-flex; align-items: center;
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 10px 25px; border-radius: 100px; margin-top: 20px; gap: 12px;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        #u-name { font-weight: 800; color: #fff; font-size: 15px; }
        #u-lv { font-weight: 800; color: var(--primary); background: rgba(255,90,95,0.1); padding: 2px 10px; border-radius: 50px; font-size: 12px; }

        /* Welfare Grid */
        .benefit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; }
        
        .card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px;
            padding: 30px; transition: all 0.3s ease; cursor: pointer;
            display: flex; flex-direction: column; justify-content: space-between; min-height: 190px;
        }
        .card:hover:not(.locked) { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 12px 30px -10px var(--primary-glow); }
        .card.locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

        .card-tag { font-size: 10px; font-weight: 700; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 12px; }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .card-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
        .card-btn { margin-top: 20px; font-size: 12px; font-weight: 700; color: var(--primary); }

        /* Skeleton Loading */
        .skeleton { background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; height: 190px; border-radius: 28px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Modal */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }
        .modal-content {
            background: #0f0f0f; border: 1px solid var(--border); border-radius: 32px;
            width: 100%; max-width: 480px; padding: 35px; position: relative;
        }
        .close-x { position: absolute; top: 20px; right: 25px; font-size: 28px; cursor: pointer; color: #444; }

        .form-group { margin-bottom: 22px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-dim); display: block; margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea {
            width: 100%; background: #1a1a1a; border: 1px solid var(--border);
            border-radius: 14px; padding: 15px; color: #fff; outline: none; font-size: 14px;
        }
        input:focus, select:focus { border-color: var(--primary); }
        select:disabled { opacity: 0.5; cursor: not-allowed; }

        .submit-btn {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: var(--primary); color: #fff; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.2s;
        }
        .submit-btn:disabled { background: #333; cursor: not-allowed; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>VIP 福利預約系統</h1>
            <div class="user-pill">
                <span class="status-dot"></span>
                <span id="u-name">Syncing Profile...</span>
                <span id="u-lv">--</span>
            </div>
        </header>

        <!-- Loading State -->
        <div id="loading-view" class="benefit-grid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>

        <!-- Cards -->
        <div id="benefit-grid" class="benefit-grid hidden"></div>
    </div>

    <!-- Booking Modal -->
    <div id="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal()">&times;</span>
            <h2 id="m-title" style="margin-bottom: 25px; font-size: 22px;">福利預約</h2>
            
            <div class="form-group">
                <label>主播 ID / ANCHOR ID</label>
                <input type="text" id="anchor_id" placeholder="請輸入主播 ID">
            </div>
            
            <div class="form-group" id="date-group">
                <!-- 這裡會根據福利動態生成 Select 或 Date Input -->
            </div>
            
            <div class="form-group">
                <label>需求備註 / REMARK</label>
                <textarea id="reserve_content" rows="3" placeholder="請填寫必要文字資訊..."></textarea>
            </div>
            
            <button id="btn-submit" class="submit-btn" onclick="handleFormSubmit()">確認提交申請</button>
        </div>
    </div>

    <script>
        const USER_API = 'https://swag-user-info-api-905468082258.asia-east1.run.app/api/badges';
        const GAS_API = 'https://script.google.com/macros/s/AKfycbyJ4XOkzGnttpknKQSBGHDOuTxGfcj3J_qT62X7Soo1lsXnI-bprJC6l0SUubj4cNWgtw/exec';

        let currentUser = { id: '', level: 0, username: '' };
        let currentWelfare = null;
        let grandSponsorBookings = []; // 存放從 GAS GrandSponsor 分頁撈回來的數據

        const WELFARES = [
            { id: '1', name: '大神贊助', lv: 50, desc: '心儀創作者直播間高度曝光 24 小時' },
            { id: '2', name: '女神聚會', lv: 50, desc: '參加線下高質感聚會交流互動' },
            { id: '3', name: '訂製小鈴噹通知', lv: 60, desc: '為心儀主播客製化通知宣傳' },
            { id: '4', name: '蓋板創作者封面', lv: 70, desc: '專屬全站進入蓋板曝光製作' },
            { id: '5', name: '訂製搜尋框文字', lv: 70, desc: '指定創作者 ID 於搜尋框展示' },
            { id: '6', name: '訂製專屬徽章', lv: 80, desc: '打造專屬直播間徽章身份象徵' },
            { id: '7', name: '訂製專屬禮物', lv: 80, desc: '打造專屬直播間動畫禮物' },
            { id: '8', name: '專屬直播欄位廣告', lv: 90, desc: '所有直播欄位中黃金廣告位曝光' }
        ];

        // 啟動：獲取等級與名稱
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            currentUser.id = urlParams.get('user_id');

            if (!currentUser.id) {
                document.getElementById('u-name').innerText = "Missing User ID";
                return;
            }

            try {
                const response = await fetch(`${USER_API}?user_id=${currentUser.id}`);
                const data = await response.json();
                
                currentUser.username = data.display_name || data.username || `User_${currentUser.id}`;
                currentUser.level = data.level || (data.data && data.data.level) || 0;
                
                document.getElementById('u-name').innerText = currentUser.username;
                document.getElementById('u-lv').innerText = `LV.${currentUser.level}`;
                
                renderCards();
            } catch (err) {
                console.error("API Error:", err);
                document.getElementById('u-name').innerText = "API Offline";
            } finally {
                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('benefit-grid').classList.remove('hidden');
            }
        }

        function renderCards() {
            const grid = document.getElementById('benefit-grid');
            grid.innerHTML = WELFARES.map(w => {
                const locked = currentUser.level < w.lv;
                return `
                    <div class="card ${locked ? 'locked' : ''}" onclick="${locked ? '' : `openBooking('${w.id}')`}">
                        <div>
                            <div class="card-tag">LV.${w.lv} Requirement</div>
                            <h3 class="card-title">${w.name}</h3>
                            <p class="card-desc">${w.desc}</p>
                        </div>
                        <div class="card-btn">${locked ? '🔒 尚未解鎖' : '立即預約 →'}</div>
                    </div>
                `;
            }).join('');
        }

        async function openBooking(id) {
            currentWelfare = WELFARES.find(w => w.id === id);
            document.getElementById('m-title').innerText = currentWelfare.name;
            document.getElementById('modal').style.display = 'flex';
            
            // 重置
            document.getElementById('anchor_id').value = '';
            document.getElementById('reserve_content').value = '';
            const dateGroup = document.getElementById('date-group');

            if (currentWelfare.name === '大神贊助') {
                dateGroup.innerHTML = `<label>預約日期 (動態檢查名額)</label><select id="reserve_date"><option value="">正在載入數據...</option></select>`;
                try {
                    // 對接 GAS v8: action=getGrandSponsorData 讀取英文分頁
                    const res = await fetch(`${GAS_API}?action=getGrandSponsorData`);
                    grandSponsorBookings = await res.json();
                    setupDynamicCalendar();
                } catch(e) {
                    grandSponsorBookings = [];
                    setupDynamicCalendar();
                }
            } else {
                dateGroup.innerHTML = `<label>預約日期</label><input type="date" id="reserve_date">`;
            }
        }

        // 大神贊助：專屬下拉選單邏輯
        function setupDynamicCalendar() {
            const select = document.getElementById('reserve_date');
            const anchorInput = document.getElementById('anchor_id');
            
            const refresh = () => {
                const anchorId = anchorInput.value.trim();
                if (!anchorId) {
                    select.innerHTML = '<option value="">請先輸入主播 ID</option>';
                    select.disabled = true;
                    return;
                }
                
                select.disabled = false;
                select.innerHTML = '<option value="">請選擇日期...</option>';
                
                const today = new Date();
                for (let i = 1; i <= 30; i++) {
                    const d = new Date(today);
                    d.setDate(today.getDate() + i);
                    const dateStr = d.toISOString().split('T')[0];

                    // 比對從 GrandSponsor 分頁拿回來的資料
                    const dayBookings = grandSponsorBookings.filter(b => b.date === dateStr);
                    const isAnchorOccupied = dayBookings.some(b => b.anchor_id === anchorId);
                    const userMonthCount = grandSponsorBookings.filter(b => b.user_id == currentUser.id && b.date.substring(0,7) === dateStr.substring(0,7)).length;

                    let status = "";
                    let disabled = false;

                    if (currentUser.level >= 90) {
                        // LV 90+ 特權
                        if (userMonthCount >= 2) { status = " (本月2次已滿)"; disabled = true; }
                        else if (isAnchorOccupied) { status = " (此主播已被預約)"; disabled = true; }
                        else { status = " (Lv.90 優先名額)"; }
                    } else {
                        // 一般用戶
                        if (userMonthCount >= 1) { status = " (本月已預約過)"; disabled = true; }
                        else if (isAnchorOccupied) { status = " (主播已預約)"; disabled = true; }
                        else if (dayBookings.length >= 3) { status = " (日期額滿)"; disabled = true; }
                    }

                    const opt = document.createElement('option');
                    opt.value = dateStr;
                    opt.text = `${dateStr}${status}`;
                    opt.disabled = disabled;
                    select.add(opt);
                }
            };

            anchorInput.oninput = refresh;
            refresh();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function handleFormSubmit() {
            const btn = document.getElementById('btn-submit');
            const anchorId = document.getElementById('anchor_id').value.trim();
            const dateVal = document.getElementById('reserve_date').value;

            if (!anchorId || !dateVal) return alert("請完整填寫主播 ID 與日期");

            // 準備發送到 GAS 的 Payload
            const payload = {
                user_id: String(currentUser.id),
                username: String(currentUser.username),
                level: Number(currentUser.level),
                benefit: String(currentWelfare.name), // 後端 Mapping 會將此轉為英文分頁名
                anchor_id: String(anchorId),
                date: String(dateVal),
                content: String(document.getElementById('reserve_content').value)
            };

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                await fetch(GAS_API, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                
                alert("預約成功！資料已同步至後台。");
                closeModal();
                location.reload();
            } catch (err) {
                alert("提交失敗，請檢查網路連線");
            } finally {
                btn.disabled = false;
                btn.innerText = "確認提交申請";
            }
        }

        init();
    </script>
</body>
</html>
