<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAG VIP Welfare System</title>
    <style>
        :root { --bg: #050505; --card-bg: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.1); --primary: #ff5a5f; --text-main: #ffffff; --text-dim: #888888; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 850px; width: 100%; }
        header { text-align: center; margin-bottom: 30px; }
        .user-pill { display: inline-flex; align-items: center; background: var(--card-bg); border: 1px solid var(--border); padding: 10px 25px; border-radius: 100px; margin-top: 10px; gap: 12px; }
        #u-name { font-weight: 800; font-size: 15px; }
        #u-lv { font-weight: 800; color: var(--primary); }

        /* 歷史紀錄區域 */
        .history-section { background: rgba(255,255,255,0.02); border-radius: 20px; padding: 20px; margin-bottom: 40px; border: 1px dashed #333; }
        .history-title { font-size: 14px; font-weight: 700; color: #555; margin-bottom: 15px; text-transform: uppercase; }
        .history-item { display: flex; justify-content: space-between; font-size: 13px; padding: 10px 0; border-bottom: 1px solid #111; }
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: #222; color: #888; }

        .benefit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; width: 100%; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 25px; transition: 0.3s; cursor: pointer; min-height: 180px; display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover:not(.locked) { border-color: var(--primary); transform: translateY(-5px); }
        .card.locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: #0f0f0f; border: 1px solid var(--border); border-radius: 32px; width: 100%; max-width: 500px; padding: 30px; position: relative; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-dim); display: block; margin-bottom: 6px; }
        input, select, textarea { width: 100%; background: #1a1a1a; border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: #fff; outline: none; font-size: 14px; }
        .check-btn { background: #333; color: #fff; border: none; padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer; margin: 8px 0; width: 100%; }
        .submit-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; margin-top: 15px; }
        .hidden { display: none !important; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #ccc; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>VIP 福利預約系統</h1>
            <div class="user-pill">
                <span id="u-name">Syncing...</span>
                <span id="u-lv">--</span>
            </div>
        </header>

        <!-- 我的預約歷史 -->
        <div class="history-section" id="history-section">
            <div class="history-title">My Reservations / 預約紀錄</div>
            <div id="history-list"><p style="color:#333; font-size:12px;">暫無預約紀錄</p></div>
        </div>

        <div id="benefit-grid" class="benefit-grid"></div>
    </div>

    <!-- Booking Modal -->
    <div id="modal">
        <div class="modal-content">
            <button onclick="closeModal()" style="position:absolute; top:20px; right:25px; background:none; border:none; color:#444; font-size:28px; cursor:pointer;">&times;</button>
            <h2 id="m-title" style="margin-bottom: 20px;">福利預約</h2>
            
            <div id="common-fields">
                <div class="form-group" id="sw-id-group">
                    <label>Swagger ID</label>
                    <input type="text" id="swagger_id" placeholder="請輸入 ID">
                    <button id="btn-check" class="check-btn" onclick="syncAndCheck()">🔍 核對名額狀況</button>
                </div>
                <div class="form-group" id="date-group">
                    <label>日期 / 場次</label>
                    <select id="reserve_date" disabled><option>請先完成核對</option></select>
                </div>
            </div>

            <!-- 專屬欄位：小鈴噹 -->
            <div id="bell-fields" class="hidden">
                <div class="form-group"><label>發送文字 (限 20 字)</label><input type="text" id="bell_msg" maxlength="20"></div>
                <div class="checkbox-group"><input type="checkbox" id="bell_brand" style="width:auto;"><label>是否冠名</label></div>
            </div>

            <!-- 專屬欄位：徽章 -->
            <div id="badge-fields" class="hidden">
                <div class="form-group"><label>徽章名稱</label><input type="text" id="b_name"></div>
                <div class="form-group"><label>元素或文字</label><input type="text" id="b_elem"></div>
                <div class="form-group"><label>示意圖 (雲端網址)</label><input type="url" id="b_url" placeholder="https://drive.google.com/..."></div>
                <div class="form-group"><label>贈與帳號 (最多 10 個 ID)</label><textarea id="b_targets" rows="3" placeholder="請輸入 ID，每行一個"></textarea></div>
            </div>

            <!-- 專屬欄位：禮物 -->
            <div id="gift-fields" class="hidden">
                <div class="form-group"><label>禮物名稱</label><input type="text" id="g_name"></div>
                <div class="checkbox-group"><input type="checkbox" id="g_brand" style="width:auto;"><label>是否冠名</label></div>
                <div class="form-group"><label>禮物圖上文字</label><input type="text" id="g_txt"></div>
                <div class="form-group"><label>禮物鑽石數</label><input type="number" id="g_dia"></div>
                <div class="checkbox-group"><input type="checkbox" id="g_photo" style="width:auto;" onchange="toggleGiftAnchor()"> <label>需要主播照片作為素材</label></div>
            </div>
            
            <div class="form-group"><label>特殊需求備註</label><textarea id="reserve_content" rows="2"></textarea></div>
            
            <button id="btn-submit" class="submit-btn" onclick="handleFormSubmit()">確認提交申請</button>
        </div>
    </div>

    <script>
        const USER_API = 'https://swag-user-info-api-905468082258.asia-east1.run.app/api/badges';
        const GAS_API = 'https://script.google.com/macros/s/AKfycbzGOjbRowzpQRyP5l7NohKllWF7idzurAJGFE7HiHUG9m5LJFQrMne129L-QbeQ2Uur8g/exec';

        let user = { id: '', username: '', level: 0 };
        let activeWelfare = null;
        let bookings = [];

        const WELFARES = [
            { name: '大神贊助', lv: 50 }, { name: '女神聚會', lv: 50 },
            { name: '訂製小鈴噹通知', lv: 60 }, { name: '蓋板創作者封面', lv: 70 },
            { name: '訂製搜尋框文字', lv: 70 }, { name: '訂製專屬徽章', lv: 80 },
            { name: '訂製專屬禮物', lv: 80 }
        ];

        async function init() {
            const params = new URLSearchParams(window.location.search);
            user.id = params.get('user_id');
            if (!user.id) return;
            try {
                const res = await fetch(`${USER_API}?user_id=${user.id}`);
                const data = await res.json();
                user.username = (data.username || data.display_name || user.id).trim();
                user.level = data.level || (data.data && data.data.level) || 0;
                document.getElementById('u-name').innerText = user.username;
                document.getElementById('u-lv').innerText = `LV.${user.level}`;
                
                fetchHistory(); // 載入歷史紀錄
                renderCards();
            } catch(e) { console.error(e); }
        }

        async function fetchHistory() {
            try {
                const res = await fetch(`${GAS_API}?action=getUserHistory&username=${user.username}`);
                const list = await res.json();
                const container = document.getElementById('history-list');
                if (list.length === 0) return;
                container.innerHTML = list.map(h => `
                    <div class="history-item">
                        <span><b>${h.benefit}</b></span>
                        <span style="color:#aaa">${h.officialDate || h.date || '官方審核中'}</span>
                        <span class="status-badge">${h.status}</span>
                    </div>
                `).join('');
            } catch(e) {}
        }

        function renderCards() {
            const grid = document.getElementById('benefit-grid');
            grid.innerHTML = WELFARES.map(w => {
                const locked = user.level < w.lv;
                return `<div class="card ${locked ? 'locked' : ''}" onclick="${locked?'':'openBooking(\''+w.name+'\')'}">
                    <h3>${w.name}</h3><p style="font-size:11px; color:#555;">LV.${w.lv}+ Requirement</p>
                    <div style="color:var(--primary); font-size:12px; font-weight:700;">${locked?'🔒 尚未解鎖':'立即預約 →'}</div>
                </div>`;
            }).join('');
        }

        function openBooking(name) {
            activeWelfare = name;
            document.getElementById('m-title').innerText = name;
            document.getElementById('modal').style.display = 'flex';
            
            // 初始顯隱控制
            document.getElementById('common-fields').classList.toggle('hidden', name === '訂製專屬徽章' || name === '訂製專屬禮物');
            document.getElementById('bell-fields').classList.toggle('hidden', name !== '訂製小鈴噹通知');
            document.getElementById('badge-fields').classList.toggle('hidden', name !== '訂製專屬徽章');
            document.getElementById('gift-fields').classList.toggle('hidden', name !== '訂製專屬禮物');
            
            if (name === '訂製專屬禮物') toggleGiftAnchor();
        }

        function toggleGiftAnchor() {
            const needPhoto = document.getElementById('g_photo').checked;
            document.getElementById('sw-id-group').classList.toggle('hidden', !needPhoto);
            // 禮物不需要日期選擇，日期由官方決定
            document.getElementById('date-group').classList.add('hidden');
        }

        async function syncAndCheck() {
            const sid = document.getElementById('swagger_id').value.trim();
            if (!sid) return alert("請輸入 Swagger ID");
            const btn = document.getElementById('btn-check');
            btn.innerText = "⏳ 同步中..."; btn.disabled = true;
            try {
                const actionMap = { '大神贊助': 'getGrandSponsorData', '女神聚會': 'getPartyData', '訂製小鈴噹通知': 'getBellData', '蓋板創作者封面': 'getCoverData', '訂製搜尋框文字': 'getSearchBoxData' };
                const res = await fetch(`${GAS_API}?action=${actionMap[activeWelfare]}&v=${Date.now()}`);
                bookings = await res.json();
                const select = document.getElementById('reserve_date');
                select.disabled = false; select.innerHTML = '<option value="">請選擇可用日期</option>';
                
                // 這裡複用之前的 GS/PT/Bell 渲染邏輯...
                renderDateOptions(sid, select);
                btn.innerText = "✅ 核對完成";
            } catch (e) { alert("同步失敗"); }
            finally { btn.disabled = false; }
        }

        function renderDateOptions(sid, select) {
            const today = new Date();
            for (let i = 1; i <= 30; i++) {
                const d = new Date(today); d.setDate(today.getDate() + i);
                const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                const isTaken = bookings.some(b => String(b.swagger_id).trim() === sid && b.date === ds);
                const opt = document.createElement('option'); opt.value = ds; opt.text = ds + (isTaken ? " (已被預約)" : ""); opt.disabled = isTaken; select.add(opt);
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function handleFormSubmit() {
            const btn = document.getElementById('btn-submit');
            if (!confirm("一經送出不得更改，請再三確認內容，若發現仇恨言論將取消本次福利資格。")) return;
            btn.disabled = true; btn.innerText = "Submitting...";

            const payload = {
                username: user.username, level: user.level, benefit: activeWelfare,
                swagger_id: document.getElementById('swagger_id').value,
                date: document.getElementById('reserve_date').value,
                content: document.getElementById('reserve_content').value,
                // 新欄位
                badge_name: document.getElementById('b_name').value,
                badge_elements: document.getElementById('b_elem').value,
                img_url: document.getElementById('b_url').value,
                target_ids: document.getElementById('b_targets').value,
                gift_name: document.getElementById('g_name').value,
                is_branded: document.getElementById('g_brand').checked ? "是" : "否",
                gift_text: document.getElementById('g_txt').value,
                diamonds: document.getElementById('g_dia').value,
                need_photo: document.getElementById('g_photo').checked ? "是" : "否"
            };

            try {
                await fetch(GAS_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("預約成功！"); location.reload();
            } catch (e) { alert("失敗"); btn.disabled = false; }
        }
        init();
    </script>
</body>
</html>
