<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAG VIP Welfare System</title>
    <style>
        :root { --bg: #050505; --card-bg: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.1); --primary: #ff5a5f; --text-main: #ffffff; --text-dim: #888888; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 850px; width: 100%; }
        header { text-align: center; margin-bottom: 40px; }
        .user-pill { display: inline-flex; align-items: center; background: var(--card-bg); border: 1px solid var(--border); padding: 10px 25px; border-radius: 100px; margin-top: 20px; gap: 12px; }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        #u-name { font-weight: 800; font-size: 15px; }
        #u-lv { font-weight: 800; color: var(--primary); background: rgba(255,90,95,0.1); padding: 2px 10px; border-radius: 50px; font-size: 12px; }
        .benefit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 30px; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 190px; }
        .card:hover:not(.locked) { transform: translateY(-5px); border-color: var(--primary); }
        .card.locked { opacity: 0.3; cursor: not-allowed; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: #0f0f0f; border: 1px solid var(--border); border-radius: 32px; width: 100%; max-width: 480px; padding: 30px; position: relative; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 18px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-dim); display: block; margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; background: #1a1a1a; border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: #fff; outline: none; font-size: 14px; }
        .check-btn { background: #333; color: #fff; border: none; padding: 12px; border-radius: 12px; font-size: 12px; cursor: pointer; margin-top: 8px; width: 100%; transition: 0.2s; }
        .check-btn:hover { background: #444; }
        .submit-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--primary); color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .submit-btn:disabled { background: #333; }
        .char-count { font-size: 10px; color: #555; text-align: right; margin-top: 4px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #ccc; margin: 10px 0; }
        .checkbox-group input { width: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>VIP 福利預約系統</h1>
            <div class="user-pill">
                <span class="status-dot"></span>
                <span id="u-name">Syncing Profile...</span>
                <span id="u-lv">--</span>
            </div>
        </header>
        <div id="benefit-grid" class="benefit-grid"></div>
    </div>

    <!-- Booking Modal -->
    <div id="modal">
        <div class="modal-content">
            <button onclick="closeModal()" style="position:absolute; top:20px; right:25px; background:none; border:none; color:#444; font-size:28px; cursor:pointer;">&times;</button>
            <h2 id="m-title" style="margin-bottom: 25px;">福利預約</h2>
            
            <!-- 公用：Swagger ID -->
            <div class="form-group">
                <label>指定 Swagger ID</label>
                <input type="text" id="swagger_id" placeholder="請輸入欲預約的 Swagger ID">
                <button id="btn-check" class="check-btn" onclick="syncAndCheck()">🔍 檢查此 ID 與名額狀況</button>
            </div>
            
            <!-- 公用：日期/場次 (由 JS 控制) -->
            <div class="form-group" id="date-group">
                <label>日期/場次</label>
                <select id="reserve_date" disabled><option>請先輸入 ID 並點擊檢查</option></select>
            </div>

            <!-- 小鈴噹專屬：發送文字與冠名 -->
            <div id="bell-only" class="hidden">
                <div class="form-group">
                    <label>發送文字 (限 20 字內)</label>
                    <input type="text" id="bell_message" maxlength="20" placeholder="請輸入推播訊息內容">
                    <div class="char-count" id="bell-count">0 / 20</div>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="is_branded">
                    <label for="is_branded" style="display:inline; text-transform:none;">是否冠名 (勾選為「是」)</label>
                </div>
            </div>
            
            <!-- 公用：備註 -->
            <div class="form-group">
                <label>需求備註 / Remark</label>
                <textarea id="reserve_content" rows="3" placeholder="請輸入相關特殊需求..."></textarea>
            </div>
            
            <button id="btn-submit" class="submit-btn" onclick="handleFormSubmit()">確認提交申請</button>
        </div>
    </div>

    <script>
        const USER_API = 'https://swag-user-info-api-905468082258.asia-east1.run.app/api/badges';
        const GAS_API = 'https://script.google.com/macros/s/AKfycbzGOjbRowzpQRyP5l7NohKllWF7idzurAJGFE7HiHUG9m5LJFQrMne129L-QbeQ2Uur8g/exec';

        let user = { id: '', username: '', level: 0 };
        let activeWelfare = null;
        let bookings = [];

        const WELFARES = [
            { name: '大神贊助', lv: 50 },
            { name: '女神聚會', lv: 50 },
            { name: '訂製小鈴噹通知', lv: 60 }
        ];

        async function init() {
            const params = new URLSearchParams(window.location.search);
            user.id = params.get('user_id');
            if (!user.id) return;
            try {
                const res = await fetch(`${USER_API}?user_id=${user.id}`);
                const data = await res.json();
                user.username = data.username || data.display_name || user.id;
                user.level = data.level || (data.data && data.data.level) || 0;
                document.getElementById('u-name').innerText = user.username;
                document.getElementById('u-lv').innerText = `LV.${user.level}`;
                renderCards();
            } catch(e) { console.error(e); }
        }

        function renderCards() {
            const grid = document.getElementById('benefit-grid');
            grid.innerHTML = WELFARES.map(w => {
                const locked = user.level < w.lv;
                return `<div class="card ${locked ? 'locked' : ''}" onclick="${locked?'':'openBooking(\''+w.name+'\')'}">
                    <h3>${w.name}</h3>
                    <p style="font-size:12px; color:#666;">門檻：LV.${w.lv}</p>
                    <div style="color:var(--primary); font-size:12px; font-weight:700; margin-top:15px;">${locked?'🔒 尚未解鎖':'立即預約 →'}</div>
                </div>`;
            }).join('');
        }

        function openBooking(name) {
            activeWelfare = name;
            document.getElementById('m-title').innerText = name;
            document.getElementById('modal').style.display = 'flex';
            
            // 重置欄位
            document.getElementById('swagger_id').value = "";
            document.getElementById('reserve_content').value = "";
            document.getElementById('reserve_date').disabled = true;
            document.getElementById('reserve_date').innerHTML = '<option>請先輸入 ID 並點擊檢查</option>';
            
            // 控制小鈴噹專用欄位顯示
            document.getElementById('bell-only').classList.toggle('hidden', name !== '訂製小鈴噹通知');
            if (name === '訂製小鈴噹通知') {
                document.getElementById('bell_message').value = "";
                document.getElementById('is_branded').checked = false;
                document.getElementById('bell-count').innerText = "0 / 20";
                document.getElementById('bell_message').oninput = (e) => {
                    document.getElementById('bell-count').innerText = `${e.target.value.length} / 20`;
                };
            }
        }

        async function syncAndCheck() {
            const sid = document.getElementById('swagger_id').value.trim();
            if (!sid) return alert("請輸入 Swagger ID");
            const btn = document.getElementById('btn-check');
            btn.innerText = "⏳ 正在校對試算表..."; btn.disabled = true;

            try {
                const actionMap = { '大神贊助': 'getGrandSponsorData', '女神聚會': 'getPartyData', '訂製小鈴噹通知': 'getBellData' };
                const res = await fetch(`${GAS_API}?action=${actionMap[activeWelfare]}&v=${Date.now()}`);
                bookings = await res.json();
                
                const select = document.getElementById('reserve_date');
                select.disabled = false; select.innerHTML = '<option value="">請選擇可用日期/場次</option>';

                if (activeWelfare === '大神贊助') renderGrandSponsor(sid, select);
                else if (activeWelfare === '女神聚會') renderParty(sid, select);
                else if (activeWelfare === '訂製小鈴噹通知') renderBell(sid, select);
                
                btn.innerText = "✅ 核對完成";
            } catch (e) { alert("同步失敗"); btn.innerText = "❌ 重試"; }
            finally { btn.disabled = false; }
        }

        function renderGrandSponsor(sid, select) {
            const today = new Date();
            const limit = new Date(today.getFullYear(), today.getMonth() + 1, 5);
            for (let i = 1; i <= 60; i++) {
                const d = new Date(today); d.setDate(today.getDate() + i);
                if (d > limit) break;
                const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                const isTaken = bookings.some(b => b.swagger_id === sid && b.date === ds);
                const dayCount = bookings.filter(b => b.date === ds).length;
                const userCount = bookings.filter(b => b.username === user.username && b.date.includes(ds.substring(0,7))).length;
                let txt = ds; let dis = false;
                if (isTaken) { txt += " (此ID已被預約)"; dis = true; }
                else if (user.level < 90) {
                    if (userCount >= 1) { txt += " (本月已約過)"; dis = true; }
                    else if (dayCount >= 3) { txt += " (全站額滿)"; dis = true; }
                } else if (user.level >= 90 && userCount >= 2) { txt += " (本月2次已滿)"; dis = true; }
                const opt = document.createElement('option'); opt.value = ds; opt.text = txt; opt.disabled = dis; select.add(opt);
            }
        }

        function renderParty(sid, select) {
            const now = new Date();
            let m = ((now.getMonth() + 1) % 2 === 0) ? now.getMonth() + 1 : now.getMonth() + 2;
            let y = now.getFullYear(); if (m > 12) { m = 2; y += 1; }
            const ds = `${y}-${String(m).padStart(2,'0')}`;
            const isTaken = bookings.some(b => b.swagger_id === sid && b.date === ds);
            const opt = document.createElement('option'); opt.value = ds; opt.text = `${y}年 ${m}月場次` + (isTaken ? " (此ID已被預約)" : "");
            opt.disabled = isTaken; select.add(opt);
        }

        function renderBell(sid, select) {
            const today = new Date();
            const limit = new Date(today.getFullYear(), today.getMonth() + 1, 5);
            for (let i = 1; i <= 60; i++) {
                const d = new Date(today); d.setDate(today.getDate() + i);
                if (d > limit) break;
                const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                const isSidTaken = bookings.some(b => b.swagger_id === sid && b.date === ds);
                const isDayFull = bookings.some(b => b.date === ds);
                let txt = ds; let dis = false;
                if (isSidTaken) { txt += " (此ID已被預約)"; dis = true; }
                else if (isDayFull) { txt += " (預約額滿)"; dis = true; }
                const opt = document.createElement('option'); opt.value = ds; opt.text = txt; opt.disabled = dis; select.add(opt);
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function handleFormSubmit() {
            const sid = document.getElementById('swagger_id').value.trim();
            const date = document.getElementById('reserve_date').value;
            if (!sid || !date) return alert("請完整填寫 ID 與日期");

            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "Submitting...";

            const payload = {
                username: user.username, level: user.level, benefit: activeWelfare,
                swagger_id: sid, date: date, content: document.getElementById('reserve_content').value,
                message: document.getElementById('bell_message') ? document.getElementById('bell_message').value : "",
                is_branded: document.getElementById('is_branded') && document.getElementById('is_branded').checked ? "是" : "否"
            };

            try {
                await fetch(GAS_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("提交成功！");
                location.reload();
            } catch (e) { alert("連線失敗"); btn.disabled = false; }
        }
        init();
    </script>
</body>
</html>
