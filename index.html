<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAG VIP Welfare System</title>
    <style>
        /* --- 基礎設定 & 變數 --- */
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #ff5a5f;
            --primary-dark: #ff2d55;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.5;
            padding: 40px 20px;
        }

        /* --- 佈局 --- */
        .container { max-width: 800px; margin: 0 auto; width: 100%; }
        header { text-align: center; margin-bottom: 48px; }
        .benefit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        .hidden { display: none !important; }

        /* --- 視覺風格 (Glassmorphism) --- */
        .glass { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); 
            border-radius: 32px;
        }
        
        /* --- 福利卡片 --- */
        .benefit-card { 
            padding: 32px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            min-height: 200px;
        }
        .benefit-card:hover:not(.locked) { 
            transform: translateY(-8px); 
            border-color: var(--primary); 
            box-shadow: 0 10px 30px -10px rgba(255, 90, 95, 0.3); 
        }
        .locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

        /* --- 標籤 & 文字 --- */
        .badge { 
            font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; 
            padding: 4px 12px; background: rgba(255,255,255,0.1); border-radius: 99px; color: #aaa;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; display: inline-block; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .title { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
        .subtitle { color: var(--text-dim); font-size: 14px; }
        .user-pill { margin-top: 24px; padding: 8px 24px; display: inline-flex; align-items: center; font-size: 12px; border-radius: 99px; }

        /* --- Skeleton Loading --- */
        .skeleton { 
            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%); 
            background-size: 200% 100%; 
            animation: loading 1.5s infinite; 
            height: 160px; border-radius: 32px; 
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* --- 表單 Modal --- */
        #modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; align-items: center; justify-content: center; 
            padding: 20px; z-index: 1000; backdrop-filter: blur(8px);
        }
        .modal-content { width: 100%; max-width: 500px; padding: 32px; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 24px; font-size: 28px; color: #555; cursor: pointer; border: none; background: none; }
        
        input, textarea { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            border-radius: 16px; padding: 16px; color: white; margin-top: 8px; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); }
        label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-left: 4px; }
        
        .submit-btn { 
            width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 700; font-size: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white; cursor: pointer; margin-top: 24px; transition: 0.3s;
        }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- 語系切換 --- */
        .lang-switch { position: fixed; top: 24px; right: 24px; display: flex; gap: 8px; z-index: 100; }
        .lang-btn { background: var(--card-bg); border: 1px solid var(--glass-border); color: #888; padding: 6px 12px; border-radius: 99px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="lang-btn" onclick="setLang('zh')">繁中</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>

    <div class="container">
        <header>
            <h1 class="title" id="ui-title">VIP 預約系統</h1>
            <p class="subtitle" id="ui-subtitle">專屬於您的尊榮福利</p>
            <div class="user-pill glass">
                <span class="status-dot"></span>
                <span id="display-user-id" style="font-family: monospace; color: #888; margin-right: 12px;">Checking...</span>
                <span id="display-level" style="font-weight: 700; color: var(--primary);">--</span>
            </div>
        </header>

        <div id="loading-view" class="benefit-grid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>

        <div id="benefit-grid" class="benefit-grid hidden">
            <!-- JS 動態生成 -->
        </div>
    </div>

    <div id="modal">
        <div class="modal-content glass">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2 id="modal-title" style="font-size: 24px; margin-bottom: 24px;">福利預約</h2>
            
            <div style="margin-bottom: 16px;">
                <label id="lbl-anchor">主播 ID</label>
                <input type="text" id="anchor_id" placeholder="例如: 123456">
            </div>
            <div id="date-field" style="margin-bottom: 16px;">
                <label id="lbl-date">預約日期</label>
                <input type="date" id="reserve_date">
            </div>
            <div style="margin-bottom: 16px;">
                <label id="lbl-content">備註細節</label>
                <textarea id="reserve_content" rows="3" placeholder="請輸入相關特殊需求..."></textarea>
            </div>
            
            <button id="btn-submit" class="submit-btn" onclick="submitReservation()">立即提交預約</button>
        </div>
    </div>

    <script>
        const USER_API = 'https://swag-user-info-api-905468082258.asia-east1.run.app/api/badges';
        const GAS_API = 'https://script.google.com/macros/s/AKfycbxlMEEW3k4D8ABAlPK4WdGmNk3CC1s4mMxZP06Sfy8bm2ZcQPXIJ006RkSca9k0W7D-Ug/exec';

        let currentUser = { id: '', level: 0 };
        let selectedBenefit = null;

        const BENEFITS = [
            { id: '1', name: '大神贊助', lv: 50, desc: '直播間高度曝光曝光 24h', hasDate: true },
            { id: '2', name: '女神聚會', lv: 50, desc: '線下高質感聚會交流', hasDate: false },
            { id: '3', name: '訂製小鈴噹', lv: 60, desc: '客製化推播宣傳通知', hasDate: true },
            { id: '4', name: '蓋板創作者封面', lv: 70, desc: '全站蓋板曝光製作', hasDate: false },
            { id: '5', name: '訂製搜尋框文字', lv: 70, desc: '打造個人專屬熱搜字', hasDate: true },
            { id: '6', name: '訂製專屬徽章', lv: 80, desc: '永久存於帳號的身份象徵', hasDate: false },
            { id: '7', name: '訂製專屬禮物', lv: 80, desc: '專屬直播間動畫禮物', hasDate: false },
            { id: '8', name: '專屬直播欄位廣告', lv: 90, desc: '探索頁面焦點曝光', hasDate: false }
        ];

        async function init() {
            const params = new URLSearchParams(window.location.search);
            currentUser.id = params.get('user_id');

            if (!currentUser.id) {
                document.getElementById('display-user-id').innerText = "Missing User ID";
                return;
            }

            try {
                const res = await fetch(`${USER_API}?user_id=${currentUser.id}`);
                const data = await res.json();
                currentUser.level = data.level || (data.data && data.data.level) || 0;
                
                document.getElementById('display-user-id').innerText = `ID: ${currentUser.id}`;
                document.getElementById('display-level').innerText = `LV.${currentUser.level}`;
                
                renderBenefits();
            } catch (err) {
                document.getElementById('display-user-id').innerText = "API Error";
            } finally {
                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('benefit-grid').classList.remove('hidden');
            }
        }

        function renderBenefits() {
            const grid = document.getElementById('benefit-grid');
            grid.innerHTML = BENEFITS.map(b => {
                const isLocked = currentUser.level < b.lv;
                return `
                    <div class="benefit-card glass ${isLocked ? 'locked' : ''}" 
                         onclick="${isLocked ? '' : `openModal('${b.id}')`}">
                        <div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                                <span class="badge">LV.${b.lv} REQ</span>
                                <span>${isLocked ? '🔒' : '✅'}</span>
                            </div>
                            <h3 style="font-size: 20px; font-weight: 700; margin-bottom: 8px;">${b.name}</h3>
                            <p style="font-size: 13px; color: #888;">${b.desc}</p>
                        </div>
                        <div style="margin-top: 24px; font-size: 13px; font-weight: 700; color: ${isLocked ? '#444' : '#ff5a5f'}">
                            ${isLocked ? '尚未達成' : '立即預約 →'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModal(id) {
            selectedBenefit = BENEFITS.find(b => b.id === id);
            document.getElementById('modal-title').innerText = selectedBenefit.name;
            document.getElementById('date-field').style.display = selectedBenefit.hasDate ? 'block' : 'none';
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        async function submitReservation() {
            const btn = document.getElementById('btn-submit');
            const payload = {
                user_id: currentUser.id,
                level: currentUser.level,
                benefit: selectedBenefit.name,
                anchor_id: document.getElementById('anchor_id').value,
                date: document.getElementById('reserve_date').value,
                content: document.getElementById('reserve_content').value
            };

            if (!payload.anchor_id) return alert("請輸入主播 ID");
            if (selectedBenefit.hasDate && !payload.date) return alert("請選擇預約日期");

            btn.disabled = true;
            btn.innerText = "提交中...";

            try {
                // 使用 Google Apps Script 提交
                await fetch(GAS_API, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify(payload)
                });

                alert("預約成功！資料已同步至試算表。");
                closeModal();
                location.reload();
            } catch (err) {
                alert("提交失敗，請檢查網路。");
            } finally {
                btn.disabled = false;
                btn.innerText = "立即提交預約";
            }
        }

        init();
    </script>
</body>
</html>
