<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAG VIP Welfare System</title>
    <style>
        /* --- 2025 Modern Dark Style (No External Dependencies) --- */
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #ff5a5f;
            --primary-hover: #ff4046;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 850px; width: 100%; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
        .subtitle { color: var(--text-dim); font-size: 14px; }

        /* User Pill */
        .user-pill {
            display: inline-flex; align-items: center;
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 8px 20px; border-radius: 100px; margin-top: 20px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; margin-right: 10px; box-shadow: 0 0 10px #10b981; }

        /* Grid */
        .benefit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; }
        
        /* Card Style */
        .card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px;
            padding: 30px; transition: all 0.3s ease; cursor: pointer;
            display: flex; flex-direction: column; justify-content: space-between; min-height: 190px;
        }
        .card:hover:not(.locked) { 
            transform: translateY(-5px); border-color: var(--primary); 
            box-shadow: 0 12px 30px -10px rgba(255, 90, 95, 0.3);
        }
        .card.locked { opacity: 0.35; filter: grayscale(1); cursor: not-allowed; }

        .card-tag { font-size: 10px; font-weight: 700; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 12px; }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .card-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
        .card-btn { margin-top: 20px; font-size: 12px; font-weight: 700; color: var(--primary); }

        /* Skeleton Loading */
        .skeleton { 
            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%); 
            background-size: 200% 100%; animation: shimmer 1.5s infinite linear; 
            height: 190px; border-radius: 28px; 
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Modal */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .modal-content {
            background: #0f0f0f; border: 1px solid var(--border); border-radius: 32px;
            width: 100%; max-width: 460px; padding: 35px; position: relative;
        }
        .close-x { position: absolute; top: 20px; right: 25px; font-size: 28px; cursor: pointer; color: #444; }

        .form-group { margin-bottom: 22px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-dim); display: block; margin-bottom: 8px; text-transform: uppercase; }
        input, textarea {
            width: 100%; background: #1a1a1a; border: 1px solid var(--border);
            border-radius: 14px; padding: 15px; color: #fff; outline: none; transition: 0.2s; font-size: 14px;
        }
        input:focus { border-color: var(--primary); background: #222; }

        .submit-btn {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: var(--primary); color: #fff; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(255, 90, 95, 0.2);
        }
        .submit-btn:hover { background: var(--primary-hover); }
        .submit-btn:disabled { background: #333; cursor: not-allowed; box-shadow: none; }

        .lang-bar { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; }
        .l-btn { background: var(--card-bg); border: 1px solid var(--border); color: #888; padding: 5px 14px; border-radius: 50px; font-size: 11px; cursor: pointer; }
        .hidden { display: none !important; }

        @media (max-width: 640px) { h1 { font-size: 24px; } .card { padding: 25px; } }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button class="l-btn" onclick="setLanguage('zh')">繁中</button>
        <button class="l-btn" onclick="setLanguage('en')">EN</button>
    </div>

    <div class="container">
        <header>
            <h1 id="txt-title">VIP 福利預約系統</h1>
            <p class="subtitle" id="txt-subtitle">探索屬於您的尊榮特權</p>
            <div class="user-pill">
                <span class="status-dot"></span>
                <span id="u-id" style="color: #666; margin-right: 15px; font-family: monospace;">Syncing...</span>
                <span id="u-lv" style="font-weight: 800; color: var(--primary);">--</span>
            </div>
        </header>

        <!-- Loading State -->
        <div id="loading-view" class="benefit-grid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>

        <!-- Cards Container -->
        <div id="benefit-grid" class="benefit-grid hidden"></div>
    </div>

    <!-- Booking Modal -->
    <div id="modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal()">&times;</span>
            <h2 id="m-name" style="margin-bottom: 25px; font-size: 22px;">福利預約</h2>
            
            <div class="form-group">
                <label id="lbl-anchor">主播 ID / ANCHOR ID</label>
                <input type="text" id="anchor_id" placeholder="請輸入欲指定的主播 ID">
            </div>
            
            <div class="form-group" id="date-group">
                <label id="lbl-date">預約日期 / RESERVED DATE</label>
                <input type="date" id="reserve_date">
            </div>
            
            <div class="form-group">
                <label id="lbl-content">需求備註 / REMARK</label>
                <textarea id="reserve_content" rows="3" placeholder="請依照福利規格填寫必要文字資訊..."></textarea>
            </div>
            
            <button id="btn-submit" class="submit-btn" onclick="handleFormSubmit()">確認提交申請</button>
        </div>
    </div>

    <script>
        // API 設定
        const USER_API = 'https://swag-user-info-api-905468082258.asia-east1.run.app/api/badges';
        const GAS_API = 'https://script.google.com/macros/s/AKfycbyJ4XOkzGnttpknKQSBGHDOuTxGfcj3J_qT62X7Soo1lsXnI-bprJC6l0SUubj4cNWgtw/exec';

        let currentUser = { id: '', level: 0 };
        let currentWelfare = null;

        // 福利規格清單
        const WELFARES = [
            { id: '1', name: '大神贊助', lv: 50, desc: '心儀創作者直播間高度曝光 24 小時', hasDate: true },
            { id: '2', name: '女神聚會', lv: 50, desc: '參加線下高質感聚會，交流互動', hasDate: false },
            { id: '3', name: '訂製小鈴噹通知', lv: 60, desc: '為心儀主播客製化通知宣傳', hasDate: true },
            { id: '4', name: '蓋板創作者封面', lv: 70, desc: '專屬全站進入蓋板曝光製作', hasDate: false },
            { id: '5', name: '訂製搜尋框文字', lv: 70, desc: '指定創作者 ID 於搜尋框展示', hasDate: true },
            { id: '6', name: '訂製專屬徽章', lv: 80, desc: '打造專屬直播間徽章身份象徵', hasDate: false },
            { id: '7', name: '訂製專屬禮物', lv: 80, desc: '打造專屬直播間動畫禮物', hasDate: false },
            { id: '8', name: '專屬直播欄位廣告', lv: 90, desc: '所有直播欄位中黃金廣告位曝光', hasDate: false },
            { id: '9', name: 'CEO 午餐', lv: 90, desc: '尊榮專屬：與 CEO 共進午餐', hasDate: true }
        ];

        // 初始化：獲取用戶等級
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            currentUser.id = urlParams.get('user_id');

            if (!currentUser.id) {
                document.getElementById('u-id').innerText = "Missing User ID";
                return;
            }

            try {
                const response = await fetch(`${USER_API}?user_id=${currentUser.id}`);
                const data = await response.json();
                
                // 解析 API 等級 (相容不同 API 結構)
                currentUser.level = data.level || (data.data && data.data.level) || 0;
                
                document.getElementById('u-id').innerText = `ID: ${currentUser.id}`;
                document.getElementById('u-lv').innerText = `LV.${currentUser.level}`;
                
                renderCards();
            } catch (err) {
                console.error("Fetch Level Failed:", err);
                document.getElementById('u-id').innerText = "API Offline";
            } finally {
                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('benefit-grid').classList.remove('hidden');
            }
        }

        // 渲染福利卡片
        function renderCards() {
            const grid = document.getElementById('benefit-grid');
            grid.innerHTML = WELFARES.map(w => {
                const locked = currentUser.level < w.lv;
                return `
                    <div class="card ${locked ? 'locked' : ''}" onclick="${locked ? '' : `openBooking('${w.id}')`}">
                        <div>
                            <div class="card-tag">LV.${w.lv} Requirement</div>
                            <h3 class="card-title">${w.name}</h3>
                            <p class="card-desc">${w.desc}</p>
                        </div>
                        <div class="card-btn">${locked ? '🔒 尚未解鎖' : '立即預約申請 →'}</div>
                    </div>
                `;
            }).join('');
        }

        // 開啟彈窗
        function openBooking(id) {
            currentWelfare = WELFARES.find(w => w.id === id);
            document.getElementById('m-name').innerText = currentWelfare.name;
            document.getElementById('date-group').style.display = currentWelfare.hasDate ? 'block' : 'none';
            document.getElementById('modal').style.display = 'flex';
        }

        // 關閉彈窗
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // 提交資料到 GAS
        async function handleFormSubmit() {
            const btn = document.getElementById('btn-submit');
            const data = {
                user_id: String(currentUser.id),
                level: Number(currentUser.level),
                benefit: String(currentWelfare.name),
                anchor_id: String(document.getElementById('anchor_id').value),
                date: String(document.getElementById('reserve_date').value),
                content: String(document.getElementById('reserve_content').value)
            };

            if (!data.anchor_id) return alert("請填入主播 ID");
            if (currentWelfare.hasDate && !data.date) return alert("請選擇日期");

            btn.disabled = true;
            btn.innerText = "提交中 / Submitting...";

            try {
                // 使用 fetch POST 傳送到 GAS
                await fetch(GAS_API, {
                    method: 'POST',
                    mode: 'no-cors', // 繞過 GAS 的跨網域檢查
                    body: JSON.stringify(data)
                });

                alert("【提交完成】\n您的預約申請已成功送出！");
                closeModal();
                location.reload();

            } catch (err) {
                console.error("Submit Error:", err);
                alert("提交失敗，請檢查網路連線");
            } finally {
                btn.disabled = false;
                btn.innerText = "確認提交申請";
            }
        }

        // 多語系切換
        function setLanguage(lang) {
            const strings = {
                zh: { title: "VIP 福利預約系統", sub: "探索屬於您的尊榮特權", anchor: "主播 ID", date: "預約日期", content: "需求備註", submit: "確認提交申請" },
                en: { title: "VIP Welfare System", sub: "Exclusive Benefits for You", anchor: "Anchor ID", date: "Reserved Date", content: "Remark", submit: "Confirm Booking" }
            };
            document.getElementById('txt-title').innerText = strings[lang].title;
            document.getElementById('txt-subtitle').innerText = strings[lang].sub;
            document.getElementById('lbl-anchor').innerText = strings[lang].anchor;
            document.getElementById('lbl-date').innerText = strings[lang].date;
            document.getElementById('lbl-content').innerText = strings[lang].content;
            document.getElementById('btn-submit').innerText = strings[lang].submit;
        }

        // 初始化啟動
        init();
    </script>
</body>
</html>
