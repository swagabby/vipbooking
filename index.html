<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAG VIP Welfare System</title>
    <style>
        /* --- 核心變數設定 --- */
        :root {
            --bg-color: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-color: #ff5a5f;
            --primary-hover: #ff4046;
            --text-main: #ffffff;
            --text-dim: #888888;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* --- 基礎樣式重置 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: var(--font-family);
            line-height: 1.6;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 佈局控制 --- */
        .container { max-width: 800px; margin: 0 auto; width: 100%; }
        header { text-align: center; margin-bottom: 48px; }
        .hidden { display: none !important; }

        /* --- 視覺風格 (Glassmorphism) --- */
        .glass { 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); 
            border-radius: 24px;
        }

        /* --- 標題與用戶資訊 --- */
        .title { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
        .subtitle { color: var(--text-dim); font-size: 14px; }
        .user-pill { 
            margin-top: 24px; padding: 10px 20px; display: inline-flex; align-items: center; 
            font-size: 12px; border-radius: 99px; border: 1px solid rgba(255,255,255,0.05);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px #10b981; }

        /* --- 福利卡片網格 --- */
        .benefit-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }

        .benefit-card { 
            padding: 30px; 
            transition: all 0.3s ease; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            min-height: 200px;
        }
        .benefit-card:hover:not(.locked) { 
            transform: translateY(-5px); 
            border-color: var(--primary-color); 
            box-shadow: 0 10px 30px -10px rgba(255, 90, 95, 0.2); 
        }
        .locked { opacity: 0.25; filter: grayscale(1); cursor: not-allowed; }

        .card-tag { font-size: 10px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.05em; margin-bottom: 12px; display: block; }
        .card-name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .card-desc { font-size: 13px; color: var(--text-dim); }
        .card-action { margin-top: 24px; font-size: 12px; font-weight: 700; color: var(--primary-color); }

        /* --- Skeleton Loading --- */
        .skeleton { 
            background: linear-gradient(90deg, #0a0a0a 25%, #151515 50%, #0a0a0a 75%); 
            background-size: 200% 100%; 
            animation: loading-shimmer 1.5s infinite linear; 
            height: 180px; border-radius: 24px; 
        }
        @keyframes loading-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* --- 表單彈窗 (Modal) --- */
        #modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; align-items: center; justify-content: center; 
            padding: 20px; z-index: 1000; backdrop-filter: blur(10px);
        }
        .modal-content { width: 100%; max-width: 480px; padding: 32px; position: relative; border-radius: 32px; }
        .close-btn { position: absolute; top: 20px; right: 24px; font-size: 28px; color: var(--text-dim); cursor: pointer; border: none; background: none; }

        .form-group { margin-bottom: 20px; }
        label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-left: 4px; display: block; margin-bottom: 8px; }
        input, textarea { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            border-radius: 14px; padding: 14px; color: white; outline: none; transition: all 0.2s; font-size: 14px;
        }
        input:focus, textarea:focus { border-color: var(--primary-color); background: rgba(255,255,255,0.08); }

        .submit-btn { 
            width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 16px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white; cursor: pointer; transition: transform 0.2s;
        }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- 語系切換 --- */
        .lang-switch { position: fixed; top: 24px; right: 24px; display: flex; gap: 8px; z-index: 100; }
        .lang-btn { background: var(--card-bg); border: 1px solid var(--glass-border); color: #888; padding: 6px 14px; border-radius: 99px; font-size: 10px; cursor: pointer; transition: 0.2s; }
        .lang-btn:hover { border-color: white; color: white; }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="lang-btn" onclick="changeLanguage('zh')">繁中</button>
        <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
    </div>

    <div class="container">
        <header>
            <h1 class="title" id="ui-title">VIP 預約系統</h1>
            <p class="subtitle" id="ui-subtitle">尊榮專屬福利預約服務</p>
            <div class="user-pill glass">
                <span class="status-dot"></span>
                <span id="display-user-id" style="color: #666; margin-right: 12px; font-family: monospace;">Syncing...</span>
                <span id="display-level" style="font-weight: 800; color: var(--primary-color);">--</span>
            </div>
        </header>

        <!-- Loading View -->
        <div id="loading-view" class="benefit-grid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>

        <!-- Benefit Grid -->
        <div id="benefit-grid" class="benefit-grid hidden">
            <!-- JS 渲染內容 -->
        </div>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay">
        <div class="modal-content glass">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2 id="modal-title" style="margin-bottom: 24px; font-size: 22px;">福利預約</h2>
            
            <div class="form-group">
                <label id="lbl-anchor">主播 ID (Anchor ID)</label>
                <input type="text" id="anchor_id" placeholder="請輸入對象主播 ID">
            </div>
            
            <div class="form-group" id="date-field">
                <label id="lbl-date">預約日期 (Reserved Date)</label>
                <input type="date" id="reserve_date">
            </div>
            
            <div class="form-group">
                <label id="lbl-content">備註或客製內容</label>
                <textarea id="reserve_content" rows="3" placeholder="請輸入福利相關備註內容..."></textarea>
            </div>
            
            <button id="btn-submit" class="submit-btn" onclick="submitReservation()">確認提交預約</button>
        </div>
    </div>

    <script>
        const USER_API = 'https://swag-user-info-api-905468082258.asia-east1.run.app/api/badges';
        const GAS_API = 'https://script.google.com/macros/s/AKfycbxlMEEW3k4D8ABAlPK4WdGmNk3CC1s4mMxZP06Sfy8bm2ZcQPXIJ006RkSca9k0W7D-Ug/exec';

        let currentUser = { id: '', level: 0 };
        let selectedBenefit = null;

        const BENEFITS = [
            { id: '1', name: '大神贊助', lv: 50, desc: '指定創作者直播間高度曝光曝光 24h', hasDate: true },
            { id: '2', name: '女神聚會', lv: 50, desc: '參加線下高質感聚會交流', hasDate: false },
            { id: '3', name: '訂製小鈴噹', lv: 60, desc: '客製化推播宣傳通知', hasDate: true },
            { id: '4', name: '全站蓋板封面', lv: 70, desc: '為您製作專屬創作者封面曝光', hasDate: false },
            { id: '5', name: '訂製搜尋框文字', lv: 70, desc: '打造個人專屬搜尋熱搜字', hasDate: true },
            { id: '6', name: '訂製專屬徽章', lv: 80, desc: '永久存於帳號的身份象徵', hasDate: false },
            { id: '7', name: '訂製專屬禮物', lv: 80, desc: '直播間專屬動畫禮物', hasDate: false },
            { id: '8', name: '專屬直播欄位廣告', lv: 90, desc: '探索頁面最顯眼位置曝光', hasDate: false }
        ];

        async function init() {
            const params = new URLSearchParams(window.location.search);
            currentUser.id = params.get('user_id');

            if (!currentUser.id) {
                document.getElementById('display-user-id').innerText = "ERROR: Missing ID";
                return;
            }

            try {
                const res = await fetch(`${USER_API}?user_id=${currentUser.id}`);
                const data = await res.json();
                
                // 讀取等級
                currentUser.level = data.level || (data.data && data.data.level) || 0;
                
                document.getElementById('display-user-id').innerText = `ID: ${currentUser.id}`;
                document.getElementById('display-level').innerText = `LV.${currentUser.level}`;
                
                renderBenefits();
            } catch (err) {
                console.error("API Error:", err);
                document.getElementById('display-user-id').innerText = "API CONNECTION FAILED";
            } finally {
                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('benefit-grid').classList.remove('hidden');
            }
        }

        function renderBenefits() {
            const grid = document.getElementById('benefit-grid');
            grid.innerHTML = BENEFITS.map(b => {
                const isLocked = currentUser.level < b.lv;
                return `
                    <div class="benefit-card glass ${isLocked ? 'locked' : ''}" 
                         onclick="${isLocked ? '' : `openModal('${b.id}')`}">
                        <div>
                            <span class="card-tag">LV.${b.lv} Requirement</span>
                            <h3 class="card-name">${b.name}</h3>
                            <p class="card-desc">${b.desc}</p>
                        </div>
                        <div class="card-action">
                            ${isLocked ? '🔒 尚未達標' : '立即預約 →'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModal(id) {
            selectedBenefit = BENEFITS.find(b => b.id === id);
            document.getElementById('modal-title').innerText = selectedBenefit.name;
            document.getElementById('date-field').style.display = selectedBenefit.hasDate ? 'block' : 'none';
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        async function submitReservation() {
            const btn = document.getElementById('btn-submit');
            const payload = {
                user_id: currentUser.id,
                level: currentUser.level,
                benefit: selectedBenefit.name,
                anchor_id: document.getElementById('anchor_id').value,
                date: document.getElementById('reserve_date').value,
                content: document.getElementById('reserve_content').value
            };

            if (!payload.anchor_id) return alert("請輸入主播 ID");
            if (selectedBenefit.hasDate && !payload.date) return alert("請選擇預約日期");

            btn.disabled = true;
            btn.innerText = "提交中...";

            try {
                // 使用 POST 發送到 GAS
                await fetch(GAS_API, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify(payload)
                });

                alert("提交成功！預約資料已寫入試算表。");
                closeModal();
                location.reload();
            } catch (err) {
                alert("網路連線錯誤，請稍後再試。");
            } finally {
                btn.disabled = false;
                btn.innerText = "確認提交預約";
            }
        }

        function changeLanguage(lang) {
            const t = {
                zh: { title: "VIP 預約系統", sub: "尊榮專屬福利預約服務" },
                en: { title: "VIP Booking", sub: "Exclusive Welfare Services" }
            };
            document.getElementById('ui-title').innerText = t[lang].title;
            document.getElementById('ui-subtitle').innerText = t[lang].sub;
        }

        // 初始化
        init();
    </script>
</body>
</html>
